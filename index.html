    /* Storage shim: Claude window.storage OR browser localStorage */
    var _storage = (typeof window.storage !== 'undefined') ? window.storage : {
      get: function(key) {
        return Promise.resolve((function() {
          try { var v = localStorage.getItem(key); return v !== null ? {key:key, value:v} : null; }
          catch(e) { return null; }
        })());
      },
      set: function(key, value) {
        return Promise.resolve((function() {
          try { localStorage.setItem(key, String(value)); return {key:key, value:value}; }
          catch(e) { console.warn('[storage] set failed', key, e); return null; }
        })());
      },
      delete: function(key) {
        return Promise.resolve((function() {
          try { localStorage.removeItem(key); return {key:key, deleted:true}; }
          catch(e) { return null; }
        })());
      }
    };
  </script>

function AppleGooglePayButton({ amount, label, onSuccess, onError, T }) {
  const [available, setAvailable] = useState(null);

    if(!window.PaymentRequest){ setAvailable(false); return; }

    const methods = label==='Apple Pay'

    req.canMakePayment().then(ok=>setAvailable(ok)).catch(()=>setAvailable(false));
  }, [amount, label]);

  const pay = async () => {
    if(!window.PaymentRequest){ onError('Payment Request API not supported'); return; }
    try {
      const details = { total:{ label:'Varible Order', amount:{ currency:'USD', value: String(amount||0) } } };

      const request = new window.PaymentRequest(methods, details);
      const result = await request.show();
      await result.complete('success');

    } catch(e){ onError(_optionalChain([e, 'optionalAccess', _167 => _167.message])||'Payment cancelled'); }
  };
