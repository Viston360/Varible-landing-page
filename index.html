<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Builder Prompt Generator</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:10px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:none;
background:#0f172a;
color:white;
}

textarea{
height:80px;
}

button{
padding:12px 20px;
margin-top:20px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.generate{background:#22c55e;}
.copy{background:#3b82f6;margin-left:10px;}

.section{
margin-top:20px;
}

.output{
margin-top:25px;
background:#020617;
padding:20px;
border-radius:6px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<h1>Universal AI Prompt Builder</h1>

<label>Prompt Type</label>
<select id="type" onchange="updateFields()">
<option value="app">App</option>
<option value="website">Website</option>
<option value="device">Embedded Device</option>
<option value="automation">Automation System</option>
<option value="api">API / Backend</option>
</select>

<label>Project Name</label>
<input id="name">

<label>Users / Target</label>
<input id="users">

<div id="dynamic"></div>

<label>Extra Requirements</label>
<textarea id="extra"></textarea>

<button class="generate" onclick="generate()">Generate Prompt</button>
<button class="copy" onclick="copyPrompt()">Copy</button>

<div class="output" id="output"></div>

</div>

<script>

function updateFields(){

let type=document.getElementById("type").value
let d=document.getElementById("dynamic")

if(type=="app"){

d.innerHTML=`

<div class="section">

<label>Platform</label>
<select id="platform">
<option>Web</option>
<option>iOS</option>
<option>Android</option>
<option>Cross Platform</option>
</select>

<label>Main Features</label>
<textarea id="features"></textarea>

<label>Authentication</label>
<select id="auth">
<option>None</option>
<option>Email login</option>
<option>OAuth</option>
<option>Full RBAC</option>
</select>

</div>
`
}

if(type=="website"){

d.innerHTML=`

<label>Website Type</label>
<select id="webtype">
<option>Landing Page</option>
<option>Ecommerce</option>
<option>Portfolio</option>
<option>SaaS Website</option>
</select>

<label>Pages</label>
<input id="pages" placeholder="home about pricing dashboard">

<label>CMS</label>
<select id="cms">
<option>No</option>
<option>Headless CMS</option>
<option>Full CMS</option>
</select>

`
}

if(type=="device"){

d.innerHTML=`

<label>Platform</label>
<select id="platform">
<option>Arduino</option>
<option>ESP32</option>
<option>Raspberry Pi</option>
<option>Custom MCU</option>
</select>

<label>Sensors / Modules</label>
<textarea id="modules"></textarea>

<label>Outputs</label>
<input id="outputs" placeholder="display motor buzzer">

<label>Connectivity</label>
<select id="connect">
<option>None</option>
<option>Bluetooth</option>
<option>WiFi</option>
<option>LoRa</option>
</select>

`
}

if(type=="automation"){

d.innerHTML=`

<label>Automation Trigger</label>
<input id="trigger">

<label>Automation Actions</label>
<textarea id="actions"></textarea>

<label>Integrations</label>
<input id="integrations">

`
}

if(type=="api"){

d.innerHTML=`

<label>API Type</label>
<select id="apitype">
<option>REST</option>
<option>GraphQL</option>
<option>Microservice</option>
</select>

<label>Endpoints</label>
<textarea id="endpoints"></textarea>

<label>Database</label>
<select id="db">
<option>PostgreSQL</option>
<option>MongoDB</option>
<option>SQLite</option>
<option>Redis</option>
</select>

`
}

}

updateFields()

function generate(){

let type=document.getElementById("type").value
let name=document.getElementById("name").value
let users=document.getElementById("users").value
let extra=document.getElementById("extra").value

let prompt="You are a senior software architect.\n\n"

if(type=="app"){

prompt+=`
Design a production ready application.

Project: ${name}

Users:
${users}

Platform:
${document.getElementById("platform").value}

Features:
${document.getElementById("features").value}

Authentication:
${document.getElementById("auth").value}
`
}

if(type=="website"){

prompt+=`
Design a modern website.

Project:
${name}

Target users:
${users}

Type:
${document.getElementById("webtype").value}

Pages:
${document.getElementById("pages").value}

CMS:
${document.getElementById("cms").value}
`
}

if(type=="device"){

prompt+=`
Design embedded firmware.

Device:
${name}

Users:
${users}

Platform:
${document.getElementById("platform").value}

Modules:
${document.getElementById("modules").value}

Outputs:
${document.getElementById("outputs").value}

Connectivity:
${document.getElementById("connect").value}
`
}

if(type=="automation"){

prompt+=`
Design an automation system.

Project:
${name}

Trigger:
${document.getElementById("trigger").value}

Actions:
${document.getElementById("actions").value}

Integrations:
${document.getElementById("integrations").value}
`
}

if(type=="api"){

prompt+=`
Design a backend API.

Project:
${name}

API Type:
${document.getElementById("apitype").value}

Endpoints:
${document.getElementById("endpoints").value}

Database:
${document.getElementById("db").value}
`
}

prompt+=`

Additional Requirements:
${extra}

Output:
1. Architecture
2. Components
3. Data structure
4. Implementation plan
5. Production considerations
`

document.getElementById("output").textContent=prompt

}

function copyPrompt(){

navigator.clipboard.writeText(document.getElementById("output").textContent)

alert("Copied")

}

</script>

</body>
</html>
