<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro AI Prompt Builder vNext</title>
<style>
body{font-family:Arial, sans-serif;background:#f0f2f5;color:#333;padding:20px;}
.container{max-width:1200px;margin:auto;background:white;padding:30px;border-radius:12px;box-shadow:0 4px 25px rgba(0,0,0,0.1);}
input,textarea,select{width:100%;padding:10px;margin-top:6px;border-radius:6px;border:1px solid #ccc;background:white;color:#333;}
textarea{height:80px;}
button{padding:12px 20px;margin-top:20px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.generate{background:#4caf50;color:white;}
.copy{background:#2196f3;color:white;margin-left:10px;}
.section{margin-top:20px;}
.output{margin-top:25px;background:#eee;padding:20px;border-radius:6px;white-space:pre-wrap;max-height:500px;overflow:auto;font-family:monospace;}
label{font-weight:bold;margin-top:10px;display:block;}
.checkbox-group{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;}
.checkbox-group input{width:auto;}
.color-preview{display:inline-block;width:30px;height:30px;vertical-align:middle;margin-left:10px;border-radius:6px;border:1px solid #ccc;}
</style>
</head>
<body>
<div class="container">
<h1>Pro AI Prompt Builder vNext</h1>

<label>Prompt Type</label>
<select id="type" onchange="updateFields()">
<option value="app">App</option>
<option value="website">Website</option>
<option value="device">Embedded Device / IoT</option>
<option value="automation">Automation</option>
<option value="api">API / Backend</option>
<option value="game">Game</option>
<option value="chatbot">Chatbot</option>
<option value="auto">Automatic Prompt Generator</option>
</select>

<label>Project / Prompt Name</label>
<input id="name">

<label>Target Users</label>
<input id="users">

<div id="dynamic"></div>

<label>Subcategory / Learning Focus</label>
<select id="subcategory">
<option>Learning</option>
<option>Coding</option>
<option>Writing</option>
<option>Marketing</option>
<option>Design</option>
<option>Productivity</option>
<option>Research</option>
</select>

<label>Theme Color</label>
<input type="color" id="themeColor" value="#4caf50" onchange="updateColorPreview()">
<div class="color-preview" id="colorPreview" style="background:#4caf50"></div>

<label>Goals / Constraints</label>
<textarea id="goals" placeholder="Performance, scalability, learning objectives, limitations..."></textarea>

<label>Extra Instructions</label>
<textarea id="extra"></textarea>

<button class="generate" onclick="generatePrompt()">Generate Prompt</button>
<button class="copy" onclick="copyPrompt()">Copy</button>

<div class="output" id="output"></div>
</div>

<script>
function updateColorPreview(){
    document.getElementById("colorPreview").style.backgroundColor = document.getElementById("themeColor").value;
}

function updateFields(){
  let type = document.getElementById("type").value;
  let d = document.getElementById("dynamic");
  d.innerHTML="";

  function multiSelect(label, id, options){
    let html = `<label>${label}</label><div class="checkbox-group">`;
    options.forEach(opt => html+=`<label><input type="checkbox" value="${opt}" class="${id}"> ${opt}</label>`);
    html+="</div>";
    return html;
  }

  if(type=="app"){
    d.innerHTML=`
<label>Platform</label>
<select id="platform"><option>iOS</option><option>Android</option><option>Web</option><option>Cross-Platform</option></select>

<label>Main Features</label>
<textarea id="features" placeholder="dashboard, payments, AI assistant, notifications"></textarea>

<label>Authentication & RBAC</label>
<select id="auth"><option>None</option><option>Email Login</option><option>OAuth</option><option>Full RBAC</option></select>

<label>UX/UI Style</label>
<select id="ui"><option>Minimal</option><option>Material</option><option>Modern</option></select>

${multiSelect("AI Features","aiFeatures",["Recommendation Engine","Chat Assistant","Predictive Analytics","Automation","Voice Recognition","Adaptive Learning"])}
${multiSelect("Integrations","integrations",["Stripe","OpenAI","Firebase","Twilio","Slack","Google APIs","CRM","Email"])}
`;
  }

  if(type=="auto"){
    d.innerHTML=`
<label>Automatic Prompt Subcategory</label>
<select id="autoSubcat">
<option>Learning</option>
<option>Coding</option>
<option>Writing</option>
<option>Marketing</option>
<option>Design</option>
<option>Productivity</option>
<option>Research</option>
</select>

<label>Keywords / Focus</label>
<input id="keywords" placeholder="Python, AI, Essay, SEO, UX...">

<label>AI Recommendations</label>
${multiSelect("autoAI", "aiFeatures", ["Suggest Field","Suggest Format","Optimize Prompt","Add Constraints","Add Steps"])}
`;
  }
}

updateFields();

function generatePrompt(){
  let type = document.getElementById("type").value;
  let name = document.getElementById("name").value;
  let users = document.getElementById("users").value;
  let goals = document.getElementById("goals").value;
  let extra = document.getElementById("extra").value;
  let themeColor = document.getElementById("themeColor").value;

  function getMulti(id){
    return Array.from(document.getElementsByClassName(id)).filter(c=>c.checked).map(c=>c.value).join(", ");
  }

  let prompt = `Project/Prompt: ${name}\nType: ${type}\nTarget Users: ${users}\nTheme Color: ${themeColor}\nGoals/Constraints: ${goals}\nExtra Instructions: ${extra}\n\n`;

  if(type=="auto"){
    let subcat = document.getElementById("autoSubcat").value;
    let keywords = document.getElementById("keywords").value;
    prompt+=`Automatic Prompt for "${subcat}" with keywords: ${keywords}\nAI Recommendations: ${getMulti("autoAI")}\n`;
  } else if(type=="app"){
    prompt+=`Platform: ${document.getElementById("platform").value}\nFeatures: ${document.getElementById("features").value}\nAuthentication: ${document.getElementById("auth").value}\nUX/UI: ${document.getElementById("ui").value}\nAI Features: ${getMulti("aiFeatures")}\nIntegrations: ${getMulti("integrations")}\n`;
  }

  prompt+=`\nOutput Structure:\n1. Architecture\n2. Components / Modules\n3. Data / DB Schema\n4. Implementation Plan\n5. Testing / QA\n6. Deployment & Monitoring\n7. Security / Privacy`;

  document.getElementById("output").textContent = prompt;
}

function copyPrompt(){
  navigator.clipboard.writeText(document.getElementById("output").textContent);
  alert("Copied to clipboard");
}
</script>
</body>
</html>
